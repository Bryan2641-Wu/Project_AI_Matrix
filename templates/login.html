<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 安全防護管理中樞 - 登入</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

    <div class="login-container">
        <div class="login-card">
            <h2>AI 安防矩陣控制台</h2>
            
            {% if error %}
                <div class="error-message">
                    ⚠️ {{ error }}
                </div>
            {% endif %}

            <form action="/login" method="POST">
                <div class="form-group">
                    <label for="username">管理員帳號</label>
                    <input type="text" id="username" name="username" class="form-control" placeholder="請輸入帳號" required autocomplete="off">
                </div>
                <div class="form-group">
                    <label for="password">安全性密碼</label>
                    <input type="password" id="password" name="password" class="form-control" placeholder="請輸入密碼" required>
                </div>
                <button type="submit" class="btn-submit">驗證身分並登入</button>
            </form>
        </div>
    </div>

</body>
</html>
