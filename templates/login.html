<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登入系統 - Webcam Live</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <div class="container login-container">
        <h2>系統登入</h2>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="flash-message flash-{{ category }}">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form id="login-form" action="{{ url_for('login') }}" method="POST">
            <div class="form-group">
                <label for="username">使用者帳號</label>
                <input type="text" name="username" id="username" class="form-control" placeholder="請輸入帳號" required autocomplete="off">
            </div>
            
            <div class="form-group">
                <label for="password">安全密碼</label>
                <input type="password" name="password" id="password" class="form-control" placeholder="請輸入密碼" required>
            </div>

            <div class="checkbox-group">
                <label class="checkbox-label">
                    <input type="checkbox" id="remember-username"> 記住帳號
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" name="remember"> 記住我 (維持登入狀態)
                </label>
            </div>

            <button type="submit" class="btn btn-primary">安全登入</button>
        </form>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const usernameInput = document.getElementById('username');
            const rememberCheckbox = document.getElementById('remember-username');
            const loginForm = document.getElementById('login-form');

            const savedUsername = localStorage.getItem('saved_username');
            if (savedUsername) {
                usernameInput.value = savedUsername;
                rememberCheckbox.checked = true;
            }

            loginForm.addEventListener('submit', function() {
                if (rememberCheckbox.checked) {
                    localStorage.setItem('saved_username', usernameInput.value.trim());
                } else {
                    localStorage.removeItem('saved_username');
                }
            });
        });
    </script>
</body>
</html>
